name: Verify UTF-8 (lib)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  utf8-lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run tool/verify_utf8.dart
