name: vetgo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  dio: ^5.9.2
  geolocator: ^13.0.2
  flutter:
    sdk: flutter
  intl: ^0.19.0
  flutter_animate: ^4.5.2
  flutter_dotenv: ^6.0.1
  flutter_secure_storage: ^9.2.2
  introduction_screen: ^4.0.0
  lottie: ^3.3.3
  pinput: ^6.0.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
  assets:
    - assets/config/environment.env
    - assets/lottie/davsan.json
    - assets/onboarding/
